name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace access key
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          sed -i "s/YOUR_ACCESS_KEY/$WEB3FORMS_KEY/g" script.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
